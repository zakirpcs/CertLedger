<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — CertLedger</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/style.css?v={{ static_v }}">
</head>
<body class="admin-login-body ent-app">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div class="text-center mb-4">
      <div class="admin-login-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h4 class="fw-bold mt-3 mb-1">CertLedger</h4>
      <p class="text-muted small">CA Administration Portal</p>
    </div>

    {% if error %}
    <div class="alert alert-danger border-0 py-2 text-center small">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" autocomplete="off">
      <div class="mb-3">
        <label class="form-label fw-semibold">Admin Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" autofocus required
                 placeholder="Enter admin password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="text-center mt-4">
      <a href="/" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to User Portal</a>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
